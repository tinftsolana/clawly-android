  catalog:
    en-US:
      name: Clawly AI
      short_description: Your AI Agent. Always On.
      long_description: |-
        Clawly AI connects you to your OpenClaw agent - a personal AI that runs on its own server, works 24/7, and actually does things for you.
        Not just answers. Not just suggestions. Your agent books flights, sends emails, organizes your calendar, browses the web, and handles tasks while you sleep.
        This isn't another chatbot. This is an AI with eyes and hands - running on a dedicated server, always on, always working for you.
        YOUR AGENT. YOUR SERVER. REAL ACTIONS.
        Your OpenClaw agent lives on its own machine. It has access to your tools, your files, your accounts. It doesn't forget. It doesn't stop. It doesn't wait for you to ask - it reaches out when something needs your attention.
        Clawly is the fastest way to talk to your agent from anywhere.
        WHAT YOUR AGENT CAN DO: - Book flights, hotels, and plan complete trips for you - Send and manage your emails automatically - Monitor your calendar and remind you proactively - Browse the web, fill forms, and extract information - Break down complex projects into step-by-step plans - Draft professional messages, reports, and summaries - Run code, debug issues, and open pull requests - Learn your preferences and get smarter over time
        WHY CLAWLY: - Clean, fast mobile client for your OpenClaw agent - Full conversation history with persistent context - Switch between AI models depending on the task - Bring Your Own Key - you control your AI provider and costs
        Other apps give you a chat window. Clawly gives you a direct line to an agent that never sleeps.
        Clean interface. Fast responses. An agent that works for you 24/7.
      new_in_version: |
        Clawly AI 1.0 - Launch!
        - Connect to your OpenClaw agent from anywhere
        - Full conversation history with persistent context
        - Switch between AI models depending on the task
        - Bring Your Own Key support
